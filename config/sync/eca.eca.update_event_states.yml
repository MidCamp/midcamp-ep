        condition: ''
  Activity_set_to_open:
    label: 'Set to Open'
    plugin: eca_set_field_value
    configuration:
      field_name: moderation_state
      field_value: sessions_open
      method: 'set:clear'
      strip_tags: false
      trim: false
      save_entity: true
      object: needs_open
    successors:
      -
        id: Activity_log_open
        condition: ''
  Activity_log_open:
    label: 'Log notice'
    plugin: eca_write_log_message
    configuration:
