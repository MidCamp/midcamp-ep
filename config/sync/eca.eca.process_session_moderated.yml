  action_send_email_action_1b8cbnk:
    label: 'Send acceptance email'
    plugin: action_send_email_action
    configuration:
      recipient: '[node:author:mail]'
      subject: '🎉 [node:title] Session Accepted at [config_page:event_details:field_event_name] [config_page:event_details:field_event_year]'
      message: |-
        Hey [node:author:display-name]!

        We would love to have you present your session, [node:title] at MidCamp 2026!

        Please confirm your participation by Monday, April 13th.
        To confirm that you ARE able to present this session, please click the following link: [node:moderation-link:published]

        Conversely, if you are NOT able to present your session, please decline your session by clicking this link: [node:moderation-link:declined]

        Please do not discuss or promote your session until the session list is posted on midcamp.org as we need some time after confirmations to get the schedule finalized.

        Registration and website profile
        As a speaker you (and any co-presenters) get a free ticket for registration. Once you have confirmed your session, we will send you a follow up email with a registration link. In the meantime, please login with your user profile on midcamp.org to add an avatar, and update your bio and other details.

        Speaker support
        We truly want you to succeed as a speaker at MidCamp. Please consider reviewing the Speaker Resources page at https://www.midcamp.org/speaker-resources. If you need any help or want someone to review your slides, please reach out to us in the #speakers channel on https://mid.camp/slack.

        Schedule
        MidCamp sessions will be on Tuesday, May 12 and Wednesday, May 13. We will let you know of your session date and time as soon as we work out the schedule. If you have a schedule conflict on any of the session days, please let us know in your reply.

        Accommodations
        Visit our Travel https://www.midcamp.org/events/2026/travel-directions and Accommodations https://www.midcamp.org/events/2026/accommodations pages for more information on the venue and accommodations. Please let us know if you need any assistance with arrangements.

        If you have questions or want to discuss this further, please reply to this email.
        See you soon!
        MidCamp 2026 Organizing Team
      replace_tokens: true
    successors:
      -
        id: Activity_0ptj9ye
        condition: ''
